<div class="app-container">
  <header class="app-header">
    <h1>PDF Editor</h1>
    <div class="actions">
      <input type="file" (change)="onFileSelected($event)" accept=".pdf" [disabled]="uploading || saving">
      <span *ngIf="uploading" class="status-text">Uploading & Analyzing...</span>
      <button (click)="saveDocument()" [disabled]="!docId || uploading || saving" class="btn-primary">
        {{ saving ? 'Saving...' : 'Download PDF' }}
      </button>
    </div>
  </header>

  <main *ngIf="currentPage" class="editor-main">
    <div class="toolbar">
      <div class="toolbar-group page-controls">
        <button class="icon-button" (click)="prevPage()" [disabled]="currentPageIndex === 0" aria-label="Previous page" title="Previous page">&lsaquo;</button>
        <span class="page-counter">Page {{ currentPageIndex + 1 }} of {{ pages.length }}</span>
        <button class="icon-button" (click)="nextPage()" [disabled]="currentPageIndex === pages.length - 1" aria-label="Next page" title="Next page">&rsaquo;</button>
      </div>
      <span *ngIf="previewing" class="status-text preview-chip">Rendering preview...</span>
      <div class="toolbar-group edit-controls">
        <button type="button" class="text-tool" (click)="toggleAddText()" [class.active]="addingText" aria-label="Add text" title="Add text">T</button>
        <select class="font-select" [(ngModel)]="selectedFont" (ngModelChange)="applySelectedTextStyle()" aria-label="Font">
          <option *ngFor="let font of commonFonts" [value]="font">{{ font }}</option>
        </select>
        <input class="font-size-input" type="number" min="4" max="96" [(ngModel)]="selectedFontSize" (ngModelChange)="applySelectedTextStyle()" aria-label="Font size">
        <button type="button" class="modifier-button" (click)="toggleSelectedBold()" [class.active]="selectedBold" aria-label="Bold" title="Bold">B</button>
        <button type="button" class="modifier-button italic-button" (click)="toggleSelectedItalic()" [class.active]="selectedItalic" aria-label="Italic" title="Italic">I</button>
      </div>
    </div>

    <section class="editor-workspace">
      <aside class="page-sidebar" aria-label="Pages">
        <div class="sidebar-header">
          <span>Pages</span>
          <span>{{ pages.length }}</span>
        </div>
        <div class="page-list">
          <button
            type="button"
            class="page-thumb"
            *ngFor="let page of pages; let index = index"
            [class.active]="index === currentPageIndex"
            [attr.aria-current]="index === currentPageIndex ? 'page' : null"
            [attr.aria-label]="'Page ' + (index + 1)"
            (click)="selectPage(index)"
          >
            <span class="thumb-number">{{ index + 1 }}</span>
            <img
              [src]="apiUrl + '/document/' + docId + '/page/' + page.page_num + '/image'"
              class="thumb-image"
              alt=""
              loading="lazy"
              decoding="async"
            >
          </button>
        </div>
      </aside>

      <div class="canvas-wrapper">
        <div
          class="page-container"
          [class.adding-text]="addingText"
          [style.aspect-ratio]="currentPage.width / currentPage.height"
          (click)="handlePageClick($event, currentPage)"
        >
          <img [src]="currentPageImageUrl" class="page-image" alt="PDF Page">

          <ng-container *ngFor="let block of currentPage.text_blocks">
            <div
              class="text-frame"
              [style.left.%]="(block.bbox[0] / currentPage.width) * 100"
              [style.top.%]="(block.bbox[1] / currentPage.height) * 100"
              [style.width.%]="((block.bbox[2] - block.bbox[0]) / currentPage.width) * 100"
              [style.height.%]="((block.bbox[3] - block.bbox[1]) / currentPage.height) * 100"
              [class.changed]="isChanged(block)"
              [class.inserted]="block.inserted"
              [class.editing-insert]="block.editing && block.inserted"
              [class.moving]="block.moving"
              [class.resizing]="block.resizing"
              [class.editing-original]="block.editing && !block.inserted"
            >
              <button
                type="button"
                class="move-handle"
                aria-label="Move text"
                title="Move text"
                (pointerdown)="startTextDrag($event, currentPage, block)"
              ></button>
              <textarea
                class="text-block"
                [style.font-family]="block.font"
                [style.font-size.pt]="block.size"
                [style.font-weight]="block.bold ? '700' : '400'"
                [style.font-style]="block.italic ? 'italic' : 'normal'"
                [style.background-color]="textBlockBackground(block)"
                [attr.data-block-id]="block.id"
                [(ngModel)]="block.editedText"
                (ngModelChange)="queueBlockPreview(block)"
                (focus)="focusTextBlock(block)"
                (blur)="finishBlockEditing(currentPage, block)"
                [class.editing]="block.editing"
                [class.inserted]="block.inserted"
              ></textarea>
              <button
                type="button"
                class="resize-handle resize-right"
                aria-label="Stretch text box horizontally"
                title="Stretch horizontally"
                (pointerdown)="startTextResize($event, currentPage, block, 'right')"
              ></button>
              <button
                type="button"
                class="resize-handle resize-bottom"
                aria-label="Stretch text box vertically"
                title="Stretch vertically"
                (pointerdown)="startTextResize($event, currentPage, block, 'bottom')"
              ></button>
              <button
                type="button"
                class="resize-handle resize-corner"
                aria-label="Stretch text box"
                title="Stretch text box"
                (pointerdown)="startTextResize($event, currentPage, block, 'corner')"
              ></button>
            </div>
          </ng-container>
        </div>
      </div>
    </section>
  </main>

  <div *ngIf="!currentPage && !uploading" class="empty-state">
    <p>Please upload a PDF to start editing.</p>
  </div>
</div>
